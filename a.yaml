#    then: ...
#    else: ...
#  else:
#    if: Z
#    then: ...
#    else: ...
# ...
- for: flag
  in: ALL_FLAGS
  yield:
    if:
      all:
      - $flag # <- this line effectively expands to "if: Qqq.X1.Y1", "if: Qqq.X1.Y2", ...
      # check that it starts with "Qqq." to avoid yielding flags from other rulesets
      - starts_with:
          str: $flag
          prefix: Qqq.
    then: |
      -enable=$flag
    else: |
      # $flag is not enabled
- |
  -doc_end
